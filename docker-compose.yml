version: '3.8'

services:
  sql-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rafi_sql_api
    ports:
      - "8001:8001"
    environment:
      - DB_FILE=/app/data/my_database.duckdb
      - SQL_API_PORT=8001
    volumes:
      - ./data:/app/data
    networks:
      - rafi_network
    command: python SQL_query.py
    restart: unless-stopped

  update-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rafi_update_api
    ports:
      - "8000:8000"
    environment:
      - DB_FILE=/app/data/my_database.duckdb
      - UPDATE_API_PORT=8000
    volumes:
      - ./data:/app/data
    networks:
      - rafi_network
    command: python Update_DB.py
    restart: unless-stopped
    depends_on:
      - sql-api

  web:
    image: nginx:alpine
    container_name: rafi_web
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - rafi_network
    restart: unless-stopped

networks:
  rafi_network:
    driver: bridge

volumes:
  data:
    driver: local