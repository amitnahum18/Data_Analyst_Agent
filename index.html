<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .dark-mode {
            background-color: #1a202c;
            color: #cbd5e0;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-800 dark:text-gray-200">
    <div class="container mx-auto p-5">
        <h1 class="text-3xl font-bold text-center mb-5">שיחה מודרנית</h1>
        <div class="mb-4 text-center">
            <button id="toggleMode" class="px-4 py-2 bg-blue-500 text-white rounded">Toggle Dark/Light Mode</button>
        </div>
        <div class="mb-4">
            <input type="file" id="csvUpload" accept="text/csv" class="mb-3">
            <div id="uploadStatus" class="text-red-600"></div>
            <button id="uploadBtn" class="px-4 py-2 bg-green-500 text-white rounded">Upload CSV</button>
        </div>
        <div class="bg-white dark:bg-gray-700 p-4 rounded-lg shadow">
            <div id="messages" class="overflow-y-auto h-64 mb-5"></div>
            <div class="flex items-center">
                <input id="messageInput" class="flex-grow border rounded-l-lg p-2" type="text" placeholder="Type your message...">
                <button id="sendBtn" class="border-t border-r border-b border-gray-600 bg-blue-500 text-white rounded-r-lg px-3">Send</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('toggleMode').onclick = function() {
            document.body.classList.toggle('dark-mode');
        };

        document.getElementById('uploadBtn').onclick = function() {
            const file = document.getElementById('csvUpload').files[0];
            const formData = new FormData();
            formData.append('file', file);
            fetch('http://localhost:8000/upload', {
                method: 'POST',
                body: formData
            }).then(response => response.json()).then(data => {
                document.getElementById('uploadStatus').innerText = data.message;
            }).catch(error => {
                document.getElementById('uploadStatus').innerText = 'Error uploading file!';
            });
        };

        document.getElementById('sendBtn').onclick = function() {
            const message = document.getElementById('messageInput').value;
            fetch('https://your-n8n-instance.com/webhook/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: message })
            }).then(response => response.json()).then(data => {
                const messages = document.getElementById('messages');
                messages.innerHTML += `<div>${data.reply}</div>`;
                document.getElementById('messageInput').value = '';
            });
        };
    </script>
</body>
</html>
